<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — nerimity-sdk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #1a1a2e;
    --purple:  #a78bfa;
    --pink:    #f472b6;
    --text:    #e2e8f0;
    --dim:     rgba(255,255,255,0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* ── top bar ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 2rem 2.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .topbar .coords { line-height: 1.8; }
  .topbar .coords span { display: block; }

  .topbar .label {
    text-align: right;
    line-height: 1.8;
  }

  /* ── center ── */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 2.5rem;
  }

  .big {
    font-size: clamp(5rem, 18vw, 14rem);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 0.9;
    background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  .message {
    margin-top: 1.5rem;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 300;
    color: var(--dim);
    max-width: 480px;
    line-height: 1.5;
  }

  .message strong {
    color: var(--text);
    font-weight: 500;
  }

  .actions {
    margin-top: 2.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  a.btn {
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 0.65rem 1.6rem;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
  }

  a.btn:active { transform: scale(0.97); }

  a.btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
  }

  a.btn-ghost {
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--dim);
  }

  a.btn:hover { opacity: 0.85; }

  /* ── marquee ── */
  .marquee-wrap {
    overflow: hidden;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 1rem 0;
    white-space: nowrap;
  }

  .marquee-track {
    display: inline-flex;
    gap: 3rem;
    animation: marquee 18s linear infinite;
  }

  .marquee-track span {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .marquee-track .dot {
    color: var(--purple);
    letter-spacing: 0;
  }

  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="coords">
    <span>ERR // 404 // PAGE</span>
    <span id="ts"></span>
  </div>
  <div class="label">
    <span>nerimity-sdk</span>
    <span>docs</span>
  </div>
</div>

<div class="center">
  <div class="big">404</div>
  <p class="message">
    This page <strong>doesn't exist</strong> — or it moved.<br>
    Nothing to see here, but the rest of the docs are just fine.
  </p>
  <div class="actions">
    <a class="btn btn-primary" href="./">Go home</a>
    <a class="btn btn-ghost" href="./guide/quickstart/">Quick start</a>
    <a class="btn btn-ghost" href="./guide/installation/">Installation</a>
  </div>
</div>

<div class="marquee-wrap">
  <div class="marquee-track" id="track"></div>
</div>

<script>
  // Timestamp
  const ts = document.getElementById('ts');
  const pad = n => String(n).padStart(2,'0');
  const tick = () => {
    const d = new Date();
    ts.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  };
  tick(); setInterval(tick, 1000);

  // Marquee — duplicate for seamless loop
  const items = ['page not found', '·', 'nerimity-sdk', '·', '404', '·', 'lost in the void', '·', 'check the url', '·', 'nerimity-sdk', '·'];
  const track = document.getElementById('track');
  const html = items.map(t => t === '·' ? `<span class="dot">·</span>` : `<span>${t}</span>`).join('');
  track.innerHTML = html + html; // duplicate for seamless loop
</script>

</body>
</html>
